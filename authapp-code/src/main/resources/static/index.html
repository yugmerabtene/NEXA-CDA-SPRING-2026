<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEXA AuthApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/app.css" rel="stylesheet">
</head>
<body>
<main class="container py-5">
  <div class="row g-4">
    <div class="col-12 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="h4 mb-3">Inscription</h2>
          <form id="registerForm" class="vstack gap-3">
            <input class="form-control" id="registerUsername" placeholder="Username" required>
            <input class="form-control" id="registerEmail" type="email" placeholder="Email" required>
            <input class="form-control" id="registerPassword" type="password" placeholder="Password" required>
            <button class="btn btn-primary" type="submit">Creer le compte</button>
          </form>
          <div id="registerResult" class="alert mt-3 d-none" role="alert"></div>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="h4 mb-3">Connexion</h2>
          <form id="loginForm" class="vstack gap-3">
            <input class="form-control" id="loginEmail" type="email" placeholder="Email" required>
            <input class="form-control" id="loginPassword" type="password" placeholder="Password" required>
            <button class="btn btn-success" type="submit">Se connecter</button>
          </form>
          <div id="loginResult" class="alert mt-3 d-none" role="alert"></div>
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="h4 mb-3">Profil connecte</h2>
          <button id="loadMeButton" class="btn btn-outline-dark">Charger /api/users/me</button>
          <pre id="meResult" class="mt-3 mb-0"></pre>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="/app.js"></script>
</body>
</html>
